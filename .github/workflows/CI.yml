name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin pytest

      - name: Clean old builds
        run: |
          rm -rf wheelhouse-test dist target 2>/dev/null || true
        shell: bash

      - name: Build wheel for tests
        run: maturin build --release --features python --out wheelhouse-test

      - name: Install built wheel
        run: python -c 'import glob, subprocess, sys; wheels = glob.glob("wheelhouse-test/*.whl"); assert wheels, "No wheel found"; subprocess.check_call([sys.executable, "-m", "pip", "install", "--force-reinstall", *wheels])'

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run Rust tests
        run: cargo test -q

  build-wheel:
    name: Build wheels (${{ matrix.os }}${{ matrix.target && format(', {0}', matrix.target) || '' }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            runner: windows-latest
          - os: macos-latest
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Clean old builds
        run: |
          rm -rf wheelhouse 2>/dev/null || true
        shell: bash

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libssh2-1-dev

      - name: Build wheel (Linux x86_64, native)
        if: matrix.os == 'linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          LIBSSH2_STATIC: "1"
        run: maturin build --release --features python --compatibility manylinux_2_39 --out wheelhouse

      - name: Build wheel (Linux ARM64, native)
        if: matrix.os == 'linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          LIBSSH2_STATIC: "1"
        run: maturin build --release --features python --compatibility manylinux_2_39 --out wheelhouse

      - name: Build wheel (native)
        if: matrix.os != 'linux'
        run: maturin build --release --features python --out wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target || 'native' }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build sdist
        run: |
          rm -rf sdisthouse 2>/dev/null || true
          maturin sdist --out sdisthouse

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sdisthouse/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
